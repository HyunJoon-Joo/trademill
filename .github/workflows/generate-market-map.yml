name: Generate Daily Market Map

on:
  workflow_dispatch:

  # GitHub cron은 UTC 기준.
  # 08:30 UTC = 한국시간 17:30 KST.
  # KOSPI 장 마감 후 Yahoo 데이터가 들어올 시간을 고려해서 17:30 KST로 설정.
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: trademill-pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    name: Generate KOSPI map and deploy Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate market map
        run: node scripts/fetch-market-data.mjs

      - name: Sync public data to docs
        run: |
          mkdir -p docs/data
          rm -rf docs/data/maps
          cp -R public/data/maps docs/data/maps
          cp public/data/market-terrain.json docs/data/market-terrain.json

      - name: Show generated latest map
        run: |
          node - <<'NODE'
          const fs = require('fs');

          for (const p of ['public/data/maps/index.json', 'docs/data/maps/index.json']) {
            const json = JSON.parse(fs.readFileSync(p, 'utf8'));
            console.log(`${p} => ${json.latestMapId}`);
          }
          NODE

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data docs/data

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Generate daily market map"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
